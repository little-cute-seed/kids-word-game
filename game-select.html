<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小怪物的英文冒險 - 關卡選擇</title>
    <style>
        /* 1. 全域樣式：設定背景顏色與 Comic Sans 字體 */
        body {
            margin: 0;
            padding: 20px;
            background-color: #E3F2FD; /* 藍色淺色背景，像截圖那樣 */
            font-family: 'Comic Sans MS', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 頂部標題 (像 MMathWorld 的位置) */
        .page-title {
            color: #FF6B6B;
            font-size: 36px;
            margin-bottom: 30px;
            text-align: center;
        }

        /* 2. 網格容器 (Grid Container)：控制卡片怎麼排列 */
        .level-grid {
            display: grid;
            /* 關鍵！這行代表「自動填滿，卡片最小 300px，間距 20px」 */
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px; /* 卡片之間的間距 */
            width: 100%;
            max-width: 1200px; /* 限制最大寬度，不讓卡片撐太寬 */
            padding: 20px;
        }

        /* 3. 卡片樣式 (Level Card)：每個關卡的盒子 */
        .level-card {
            background: white;
            border-radius: 20px;
            overflow: hidden; /* 確保裡面的圖片圓角正確 */
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); /* 加上柔和的陰影 */
            transition: transform 0.2s ease; /* 加上滑鼠滑過的動畫 */
            cursor: pointer;
            text-decoration: none; /* 取消超連結底線 */
            color: inherit; /* 使用預設字體顏色 */
            display: flex;
            flex-direction: column;
        }

        /* 4. 卡片滑過效果：微微放大 */
        .level-card:hover {
            transform: translateY(-5px); /* 向上浮起 */
        }

        /* 5. 卡片上半部：封面圖片 */
        .card-cover {
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 80px; /* Emoji 的大小 */
            color: white;
            position: relative;
        }

        /* 不同關卡的不同背景色 */
        .cover-1 { background-color: #CE93D8; } /* 紫色 */
        .cover-2 { background-color: #81D4FA; } /* 藍色 */
        .cover-3 { background-color: #FFCC80; } /* 橘色 */

        /* 6. 卡片下半部：內容區域 */
        .card-content {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .level-title {
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }

        /* 標籤樣式 (Tags) */
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .tag {
            background-color: #F0F8FF;
            color: #4D96FF;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
        }

        .level-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.4;
        }

        /* 7. 開始按鈕 (像截圖的 Play Now) */
        .play-btn {
            background-color: #26A69A; /* 截圖的綠色 */
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 20px;
            margin-top: auto; /* 推到最底部 */
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <h1 class="page-title">MWordWorld - 選擇關卡</h1>

    <!-- 網格容器 (這是大的盒子) -->
    <div class="level-grid">

        <!-- 第 1 個關卡卡片 -->
        <!-- ✅ 關鍵：href="..." 要指向你的遊戲網頁連結，例如 index.html -->
        <a href="index.html?stage=1" class="level-card">
            <!-- 上半部封面 (紫色) -->
            <div class="card-cover cover-1">
                👾
            </div>
            <!-- 下半部內容 -->
            <div class="card-content">
                <div class="level-title">Level 1: Monster Food</div>
                
                <div class="tag-container">
                    <span class="tag">基礎單字</span>
                    <span class="tag">水果類</span>
                </div>

                <div class="level-desc">
                    曲奇怪獸很餓！快來餵他！練習 10 個水果單字。
                </div>

                <div class="play-btn">Play Now</div>
            </div>
        </a>

        <!-- 第 2 個關卡卡片 -->
        <a href="index.html?stage=2" class="level-card">
            <!-- 上半部封面 (藍色) -->
            <div class="card-cover cover-2">
                🚂
            </div>
            <!-- 下半部內容 -->
            <div class="card-content">
                <div class="level-title">Level 2: Train Trip</div>
                
                <div class="tag-container">
                    <span class="tag">基礎單字</span>
                    <span class="tag">交通工具</span>
                </div>

                <div class="level-desc">
                    幫助小怪物搭火車旅行！練習 10 個交通單字。
                </div>

                <div class="play-btn">Play Now</div>
            </div>
        </a>

        <!-- 第 3 個關卡卡片 -->
        <a href="index.html?stage=3" class="level-card">
            <!-- 上半部封面 (橘色) -->
            <div class="card-cover cover-3">
                ⚔️
            </div>
            <!-- 下半部內容 -->
            <div class="card-content">
                <div class="level-title">Level 3: Ninja Slice</div>
                
                <div class="tag-container">
                    <span class="tag">進階單字</span>
                    <span class="tag">動詞</span>
                </div>

                <div class="level-desc">
                    快來切開答案吧！練習常用的英文動詞。
                </div>

                <div class="play-btn">Play Now</div>
            </div>
        </a>

        <!-- 你可以繼續複製貼上更多的 <a href="..." class="level-card"> ... </a> 來增加關卡 -->

    </div>

</body>
</html>
