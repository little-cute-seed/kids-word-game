<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Word & Math Game - 選關頁面</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }

        body {
            margin: 0;
            padding: 20px;
            background-color: #F4F9F9;
            font-family: 'Comic Sans MS', 'Chalkboard SE', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .menu-container {
            background: white;
            border-radius: 25px;
            padding: 30px 20px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
        }

        h1 {
            color: #FF6B6B;
            font-size: 28px;
            margin-bottom: 25px;
        }

        .game-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .game-card {
            display: flex;
            align-items: center;
            padding: 18px;
            border-radius: 20px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            font-size: 20px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .game-card:active {
            transform: scale(0.98);
        }

        .game-card .icon {
            font-size: 40px;
            margin-right: 15px;
        }

        .game-card .info {
            text-align: left;
        }

        .game-card .info .title {
            font-size: 20px;
            margin-bottom: 4px;
        }

        .game-card .info .desc {
            font-size: 14px;
            opacity: 0.9;
            font-weight: normal;
        }

        .game-1 { background-color: #FF6B6B; }
        .game-2 { background-color: #4D96FF; }
        .game-3 { background-color: #6BCB77; }
    </style>
</head>
<body>

    <div class="menu-container">
        <h1>🎮 🐷 小屁豬樂園</h1>
        
        <div class="game-list">
            <!-- 🐷 Game 1 -->
            <a href="./monster-game/?game=1" class="game-card game-1">
                <span class="icon">🐷</span>
                <div class="info">
                    <div class="title">Game 1</div>
                    <div class="desc">餵食小屁豬 (英文單字)</div>
                </div>
            </a>

            <!-- 🚂 Game 2 -->
            <a href="./monster-game/?game=2" class="game-card game-2">
                <span class="icon">🚂</span>
                <div class="info">
                    <div class="title">Game 2</div>
                    <div class="desc">顏色小火車 (顏色單字)</div>
                </div>
            </a>

            <!-- 🚀 Game 3 -->
            <a href="./monster-game/?game=3" class="game-card game-3">
                <span class="icon">🚀</span>
                <div class="info">
                    <div class="title">Game 3</div>
                    <div class="desc">數字火箭升空 (數字序列)</div>
                </div>
            </a>
        </div>
    </div>

</body>
</html>
