<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Word Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #F4F9F9;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        #game-container {
            background: white;
            border-radius: 25px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
        }

        #stage-title {
            color: #FF6B6B;
            font-size: 26px;
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        /* 故事區塊： Emoji (小豬/火車) */
        #story-zone {
            font-size: 50px;
            margin: 0;
            padding: 0;
            min-height: 0;
            line-height: 1;
            transition: transform 0.2s ease;
        }

        .monster-bounce {
            animation: bounce 0.5s ease infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        /* 進度條容器 */
        .progress-bar-container {
            width: 100%;
            height: 20px;
            background-color: #E0E0E0;
            border-radius: 10px;
            margin: 10px 0 20px 0;
            overflow: hidden;
            border: 2px solid #FFF;
        }

        #progress {
            height: 100%;
            width: 0%;
            background-color: #FF6B6B;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        /* 題目卡片 */
        #question-card {
            font-size: 90px;
            margin: 10px 0;
            line-height: 1.1;
        }

        /* 放置區 */
        #drop-target {
            width: 80%;
            height: 60px;
            margin: 15px auto;
            border: 3px dashed #FF6B6B;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: #AAA;
            font-weight: bold;
            background-color: #FFF9F9;
            transition: all 0.2s ease;
        }

        #drop-target.hovered {
            background-color: #FFE3E3;
            transform: scale(1.05);
        }

        /* 答案選項區 */
        #options-zone {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .word-card {
            background-color: #4D96FF;
            color: white;
            padding: 12px 24px;
            border-radius: 15px;
            font-size: 22px;
            font-weight: bold;
            cursor: grab;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            user-select: none;
            touch-action: none;
            transition: transform 0.1s ease;
        }

        .word-card:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- 標題 -->
        <div id="stage-title">關卡載入中...</div>

        <!-- 小豬/火車 故事區 -->
        <div id="story-zone">🐷</div>

        <!-- 進度條 -->
        <div class="progress-bar-container">
            <div id="progress"></div>
        </div>

        <!-- 題目圖案 -->
        <div id="question-card">🐱</div>

        <!-- 拖放目標區 -->
        <div id="drop-target">拖到這裡</div>

        <!-- 選項卡片區 -->
        <div id="options-zone"></div>
    </div>

    <script>
        let gameData = null;
        let currentStageIndex = 0;
        let currentQuestionIndex = 0;
        let draggedText = "";
        let draggedElement = null;

        // 1. 初始化遊戲
        async function initGame() {
            try {
                const response = await fetch('data.json');
                gameData = await response.json();
                
                // 讀取 URL 參數 (例如 ?game=1 或 ?game=2)
                const urlParams = new URLSearchParams(window.location.search);
                const gameParam = urlParams.get('game');
                
                if (gameParam) {
                    currentStageIndex = parseInt(gameParam) - 1;
                } else {
                    currentStageIndex = 0; // 預設 Game 1
                }

                // 防呆機制
                if (isNaN(currentStageIndex) || currentStageIndex < 0 || currentStageIndex >= gameData.games.length) {
                    currentStageIndex = 0;
                }

                loadStage();
            } catch (error) {
                console.error("資料載入失敗:", error);
                document.getElementById('stage-title').innerText = "載入失敗，請檢查 data.json";
            }
        }

        // 2. 載入當前遊戲
        function loadStage() {
            if (currentStageIndex >= gameData.games.length) {
                showFinalCelebration();
                return;
            }
            currentQuestionIndex = 0;
            updateUI();
        }

        // 3. 更新畫面 UI
        function updateUI() {
            const currentGame = gameData.games[currentStageIndex];
            const question = currentGame.questions[currentQuestionIndex];
            
            // 標題與進度
            document.getElementById('stage-title').innerText = `${currentGame.name} (${currentQuestionIndex + 1}/10)`;
            document.getElementById('progress').style.width = ((currentQuestionIndex + 1) / 10 * 100) + "%";
            
            // 題目 Emoji
            document.getElementById('question-card').innerText = question.image;
            
            // 故事角色顯示
            const storyZone = document.getElementById('story-zone');
            if (currentGame.game_id === 1) {
                storyZone.innerText = "🐷 🥖";
            } else if (currentGame.game_id === 2) {
                storyZone.innerText = "🚂 🌲";
            }

            // 重置目標區
            const dropTarget = document.getElementById('drop-target');
            dropTarget.innerText = "拖到這裡";
            dropTarget.style.borderColor = "#FF6B6B";
            dropTarget.style.color = "#AAA";

            // 清空並產生卡片
            const optionsZone = document.getElementById('options-zone');
            optionsZone.innerHTML = "";

            question.options.forEach(opt => {
                const card = document.createElement('div');
                card.className = 'word-card';
                card.innerText = opt.toLowerCase(); // 顯示小寫字母
                card.setAttribute('draggable', 'true');
                
                // Mac/PC 滑鼠拖拽
                card.addEventListener('dragstart', () => { 
                    draggedText = opt; 
                });
                
                // iPad / 手機觸控拖拽
                card.addEventListener('touchstart', (e) => { 
                    draggedText = opt; 
                    draggedElement = card;
                }, {passive: true});
                
                card.addEventListener('touchmove', handleTouchMove, {passive: false});
                card.addEventListener('touchend', handleTouchEnd);

                optionsZone.appendChild(card);
            });
        }

        // 4. 滑鼠拖放監聽
        const dropTarget = document.getElementById('drop-target');
        dropTarget.addEventListener('dragover', (e) => { 
            e.preventDefault(); 
            dropTarget.classList.add('hovered'); 
        });
        dropTarget.addEventListener('dragleave', () => { 
            dropTarget.classList.remove('hovered'); 
        });
        dropTarget.addEventListener('drop', (e) => {
            e.preventDefault();
            dropTarget.classList.remove('hovered');
            checkAnswer(draggedText);
        });

        // 5. iPad 觸控拖拽邏輯
        function handleTouchMove(e) {
            e.preventDefault();
            if (!draggedElement) return;

            const touch = e.touches[0];
            draggedElement.style.position = 'fixed';
            draggedElement.style.left = (touch.clientX - 40) + 'px';
            draggedElement.style.top = (touch.clientY - 20) + 'px';
            draggedElement.style.zIndex = '1000';
            draggedElement.style.opacity = '0.85';
        }

        function handleTouchEnd(e) {
            if (!draggedElement) return;

            const touch = e.changedTouches[0];
            const targetRect = dropTarget.getBoundingClientRect();

            draggedElement.style.position = 'static';
            draggedElement.style.opacity = '1';
            draggedElement.style.zIndex = 'auto';

            if (touch.clientX >= targetRect.left && touch.clientX <= targetRect.right &&
                touch.clientY >= targetRect.top && touch.clientY <= targetRect.bottom) {
                checkAnswer(draggedText);
            }

            draggedElement = null;
        }

        // 6. 檢查答案
        function checkAnswer(selectedWord) {
            const currentGame = gameData.games[currentStageIndex];
            const correctAnswer = currentGame.questions[currentQuestionIndex].word;
            const storyZone = document.getElementById('story-zone');
            const dropTarget = document.getElementById('drop-target');

            if (selectedWord === correctAnswer) {
                dropTarget.innerText = "✓ 正確！";
                dropTarget.style.borderColor = "#4FAF44";
                dropTarget.style.color = "#4FAF44";
                
                storyZone.classList.add('monster-bounce');
                
                setTimeout(() => {
                    storyZone.classList.remove('monster-bounce');
                    currentQuestionIndex++;
                    
                    if (currentQuestionIndex >= 10) {
                        alert(`🏆 恭喜完成 ${currentGame.name}！`);
                        // 返回選單頁面
                        window.location.href = "../game-select.html";
                    } else {
                        updateUI();
                    }
                }, 800);
            } else {
                dropTarget.innerText = "❌ 再試一次";
                dropTarget.style.borderColor = "#FF4136";
                dropTarget.style.color = "#FF4136";
            }
        }

        // 7. 通關慶祝
        function showFinalCelebration() {
            document.getElementById('game-container').innerHTML = `
                <h1 style="color:#FF6B6B;">👑 通關大成功！ 👑</h1>
                <p style="font-size:80px;">🏆🎉🎈</p>
                <button onclick="window.location.href='../game-select.html'" style="padding:15px 30px; font-size:18px; border-radius:15px; background:#4FAF44; color:white; border:none; cursor:pointer;">返回選單</button>
            `;
        }

        // 啟動遊戲
        initGame();
    </script>
</body>
</html>
