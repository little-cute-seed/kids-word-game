<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kids Word Game</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #F4F9F9;
            font-family: 'Comic Sans MS', cursive, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        #game-container {
            background: white;
            border-radius: 25px;
            padding: 25px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            text-align: center;
        }

        #stage-title {
            color: #FF6B6B;
            font-size: 26px;
            margin: 0 0 10px 0;
            font-weight: bold;
        }

        /* 故事區塊： Emoji (小豬/火車) */
        #story-zone {
            font-size: 50px;
            margin: 0;
            padding: 0;
            min-height: 0;
            line-height: 1;
            transition: transform 0.2s ease;
        }

        .monster-bounce {
            animation: bounce 0.5s ease infinite alternate;
        }

        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-15px); }
        }

        /* 進度條容器 */
        .progress-bar-container {
            width: 100%;
            height: 20px;
            background-color: #E0E0E0;
            border-radius: 10px;
            margin: 10px 0 20px 0;
            overflow: hidden;
            border: 2px solid #FFF;
        }

        #progress {
            height: 100%;
            width: 0%;
            background-color: #FF6B6B;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        /* 題目卡片 */
        #question-card {
            font-size: 90px;
            margin: 10px 0;
            line-height: 1.1;
        }

        /* 放置區 */
        #drop-target {
            width: 80%;
            height: 60px;
            margin: 15px auto;
            border: 3px dashed #FF6B6B;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            color: #AAA;
            font-weight: bold;
            background-color: #FFF9F9;
            transition: all 0.2s ease;
        }

        #drop-target.hovered {
            background-color: #FFE3E3;
            transform: scale(1.05);
        }

        /* 答案選項區 */
        #options-zone {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .word-card {
            background-color: #4D96FF;
            color: white;
            padding: 12px 24px;
            border-radius: 15px;
            font-size: 22px;
            font-weight: bold;
            cursor: grab;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
            user-select: none;
            touch-action: none;
            transition: transform 0.1s ease;
        }

        .word-card:active {
            cursor: grabbing;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- 標題 -->
        <div id="stage-title">關卡載入中...</div>

        <!-- 小豬/火車 故事區 -->
        <div id="story-zone">🐷</div>

        <!-- 進度條 -->
        <div class="progress-bar-container">
            <div id="progress"></div>
        </div>

        <!-- 題目圖案 -->
        <div id="question-card">🐱</div>

        <!-- 拖放目標區 -->
        <div id="drop-target">拖到這裡</div>

        <!-- 選項卡片區 -->
        <div id="options-zone"></div>
    </div>

    <script>
    let gameData = null;
    let currentGame = null; // 當前選擇的遊戲資料
    let currentQuestionIndex = 0;
    let draggedText = "";
    let draggedElement = null;

    // 1. 初始化遊戲
    async function initGame() {
        try {
            // 加時間戳記避免瀏覽器快取舊資料
            const response = await fetch('data.json?v=' + new Date().getTime());
            gameData = await response.json();
            
            // 讀取 URL 參數 (?game=1 或 ?game=2)
            const urlParams = new URLSearchParams(window.location.search);
            const gameParam = parseInt(urlParams.get('game')) || 1; // 預設 1
            
            // 使用 find 根據 game_id 精準尋找對應遊戲
            currentGame = gameData.games.find(g => g.game_id === gameParam);
            
            // 如果找不到對應的 game_id，預設載入第一個
            if (!currentGame) {
                currentGame = gameData.games[0];
            }

            currentQuestionIndex = 0;
            updateUI();
        } catch (error) {
            console.error("資料載入失敗:", error);
            document.getElementById('stage-title').innerText = "載入失敗，請檢查 data.json";
        }
    }

    // 2. 更新畫面 UI
    function updateUI() {
        if (!currentGame || !currentGame.questions) return;

        const question = currentGame.questions[currentQuestionIndex];
        
        // 更新標題與進度條
        document.getElementById('stage-title').innerText = `${currentGame.name} (${currentQuestionIndex + 1}/10)`;
        document.getElementById('progress').style.width = ((currentQuestionIndex + 1) / 10 * 100) + "%";
        
        // 更新題目圖案
        document.getElementById('question-card').innerText = question.image;
        
        // 更新角色顯示
        const storyZone = document.getElementById('story-zone');
        if (currentGame.game_id === 1) {
            storyZone.innerText = "🐷 🥖";
        } else if (currentGame.game_id === 2) {
            storyZone.innerText = "🚂 🌲";
        } else {
            storyZone.innerText = "👾 🎮";
        }

        // 重置目標拖放區
        const dropTarget = document.getElementById('drop-target');
        dropTarget.innerText = "拖到這裡";
        dropTarget.style.borderColor = "#FF6B6B";
        dropTarget.style.color = "#AAA";

        // 清空並重新產生選項卡片
        const optionsZone = document.getElementById('options-zone');
        optionsZone.innerHTML = "";

        // 🎲 隨機打亂選項順序 (Random Shuffle)
        const shuffledOptions = [...question.options].sort(() => Math.random() - 0.5);

        // 使用洗牌後的 shuffledOptions 來產生卡片
        shuffledOptions.forEach(opt => {
            const card = document.createElement('div');
            card.className = 'word-card';
            card.innerText = opt.toLowerCase(); // 顯示小寫
            card.setAttribute('draggable', 'true');
            
            // 電腦滑鼠拖拽
            card.addEventListener('dragstart', () => { 
                draggedText = opt; 
            });
            
            // iPad 手指觸控
            card.addEventListener('touchstart', (e) => { 
                draggedText = opt; 
                draggedElement = card;
            }, {passive: true});
            
            card.addEventListener('touchmove', handleTouchMove, {passive: false});
            card.addEventListener('touchend', handleTouchEnd);

            optionsZone.appendChild(card);
        });
    }

    // 3. 滑鼠拖放監聽
    const dropTarget = document.getElementById('drop-target');
    dropTarget.addEventListener('dragover', (e) => { 
        e.preventDefault(); 
        dropTarget.classList.add('hovered'); 
    });
    dropTarget.addEventListener('dragleave', () => { 
        dropTarget.classList.remove('hovered'); 
    });
    dropTarget.addEventListener('drop', (e) => {
        e.preventDefault();
        dropTarget.classList.remove('hovered');
        checkAnswer(draggedText);
    });

    // 4. iPad 觸控拖拽邏輯
    function handleTouchMove(e) {
        e.preventDefault();
        if (!draggedElement) return;

        const touch = e.touches[0];
        draggedElement.style.position = 'fixed';
        draggedElement.style.left = (touch.clientX - 40) + 'px';
        draggedElement.style.top = (touch.clientY - 20) + 'px';
        draggedElement.style.zIndex = '1000';
        draggedElement.style.opacity = '0.85';
    }

    function handleTouchEnd(e) {
        if (!draggedElement) return;

        const touch = e.changedTouches[0];
        const targetRect = dropTarget.getBoundingClientRect();

        draggedElement.style.position = 'static';
        draggedElement.style.opacity = '1';
        draggedElement.style.zIndex = 'auto';

        if (touch.clientX >= targetRect.left && touch.clientX <= targetRect.right &&
            touch.clientY >= targetRect.top && touch.clientY <= targetRect.bottom) {
            checkAnswer(draggedText);
        }

        draggedElement = null;
    }

    // 5. 檢查答案
    function checkAnswer(selectedWord) {
        const correctAnswer = currentGame.questions[currentQuestionIndex].word;
        const storyZone = document.getElementById('story-zone');
        const dropTarget = document.getElementById('drop-target');

        if (selectedWord === correctAnswer) {
            dropTarget.innerText = "✓ 正確！";
            dropTarget.style.borderColor = "#4FAF44";
            dropTarget.style.color = "#4FAF44";
            
            storyZone.classList.add('monster-bounce');
            
            setTimeout(() => {
                storyZone.classList.remove('monster-bounce');
                currentQuestionIndex++;
                
                if (currentQuestionIndex >= currentGame.questions.length) {
                    alert(`🏆 恭喜完成 ${currentGame.name}！`);
                    window.location.href = "../game-select.html";
                } else {
                    updateUI();
                }
            }, 800);
        } else {
            dropTarget.innerText = "❌ 再試一次";
            dropTarget.style.borderColor = "#FF4136";
            dropTarget.style.color = "#FF4136";
        }
    }

    // 啟動遊戲
    initGame();
</script>
</body>
</html>
